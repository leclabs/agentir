name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt JS actions into Node 24 ahead of the June 2026 forced upgrade
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate IR types
        run: pnpm --filter @leclabs/agentir-core gen

      - name: Verify generated types are committed
        run: git diff --exit-code -- packages/core/src/ir/generated.ts

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
